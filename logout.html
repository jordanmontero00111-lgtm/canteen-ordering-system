<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Signing Out — CafeteriaHub</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--navy-900)">
  <div style="text-align:center;color:white">
    <div style="font-size:42px;margin-bottom:16px">🍽️</div>
    <div style="font-size:1rem;font-weight:600;color:rgba(255,255,255,0.6)">Signing you out...</div>
  </div>
  <div id="toasts"></div>
  <script src="js/app.js"></script>
  <script>
    localStorage.removeItem('ch_user');
    showToast('You have been signed out.', 'ok');
    setTimeout(() => { location.href = 'login.html'; }, 900);
  </script>
</body>
</html>
